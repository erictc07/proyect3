name: Mostrar y Guardar Cartelera de Amposta

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape-movies:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para escribir el fichero .txt en tu repositorio
    permissions:
      contents: write
    
    steps:
      - name: 📥 Descargar el código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: 🚀 Ejecutar el scraper
        run: python scraper.py
        
      - name: 💾 Subir el archivo de texto a GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cartelera.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🎬 Cartelera actualizada" && git push)
